name: React App CI-CD Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Set up Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 18 
          cache: 'npm'      

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build 


  build-and-push:
    runs-on: ubuntu-latest
    needs: run-tests 
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Authenticate with Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compile and Push Container Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mobile-spec-app:latest


  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: build-and-push 
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_PUBLIC_IP }}
          username: azureuser
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo docker stop mobile-app-container || true
            sudo docker rm mobile-app-container || true
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mobile-spec-app:latest
            sudo docker run -d -p 80:80 -v /mnt/azure-storage:/usr/share/nginx/html/assets/phone-images --name mobile-app-container ${{ secrets.DOCKERHUB_USERNAME }}/mobile-spec-app:latest