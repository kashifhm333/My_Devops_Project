server {
  listen       80;
  server_name  _;
  root /usr/share/nginx/html;
  index index.html;

  # Serve files directly, fallback to index.html for SPA routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets: let nginx return 404 if missing
  location /assets/ {
    try_files $uri =404;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
